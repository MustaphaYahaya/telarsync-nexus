{% extends "layout.html" %}

{% block title %}Customer Measurements{% endblock %}

{% block content %}
    <h2>Customer Measurements</h2>

    <div class="content-wrapper">
        <div class="customer-list-container">
            <h3>Current Customers</h3>
            <table id="customers-table">
                <thead>
                    <tr>
                        <th>Client Name</th>
                        <th>Phone Number</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Customer rows will be inserted here by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="add-customer-container">
            <h3>Add New Customer</h3>
            <form id="add-customer-form">
                <div class="form-group">
                    <label for="client-name">Client Name</label>
                    <input type="text" id="client-name" name="client_name" required>
                </div>
                <div class="form-group">
                    <label for="phone-number">Phone Number</label>
                    <input type="tel" id="phone-number" name="phone_number" required>
                </div>
                <h4>Measurements</h4>
                <div id="measurements-fields">
                    <div class="form-group measurement-field">
                        <label>Chest</label>
                        <input type="number" step="0.1" name="chest">
                    </div>
                     <div class="form-group measurement-field">
                        <label>Waist</label>
                        <input type="number" step="0.1" name="waist">
                    </div>
                </div>
                <div class="form-group new-field-adder">
                     <input type="text" id="new-measurement-name" placeholder="New Field Name">
                    <button type="button" id="add-measurement-field">Add Field</button>
                </div>
                <button type="submit">Add Customer</button>
            </form>
        </div>
    </div>
    
    <div id="measurements-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h3 id="modal-client-name"></h3>
            <pre id="modal-measurements-json"></pre>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const customersTableBody = document.querySelector('#customers-table tbody');
    const addCustomerForm = document.getElementById('add-customer-form');
    const measurementsFields = document.getElementById('measurements-fields');
    const addMeasurementFieldBtn = document.getElementById('add-measurement-field');
    const newMeasurementNameInput = document.getElementById('new-measurement-name');
    
    const modal = document.getElementById('measurements-modal');
    const modalClientName = document.getElementById('modal-client-name');
    const modalMeasurementsJson = document.getElementById('modal-measurements-json');
    const closeButton = document.querySelector('.close-button');

    function fetchCustomers() {
        if (!ACTIVE_ENTERPRISE_ID) return;
        fetch(`${API_BASE_URL}measurements/customers?enterprise_id=${ACTIVE_ENTERPRISE_ID}`)
            .then(response => response.json())
            .then(data => {
                customersTableBody.innerHTML = ''; 
                data.forEach(customer => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${customer.client_name}</td>
                        <td>${customer.phone_number}</td>
                        <td><button class="view-measurements" data-customer='${JSON.stringify(customer)}'>View</button></td>
                    `;
                    customersTableBody.appendChild(row);
                });
            })
            .catch(error => console.error('Error fetching customers:', error));
    }
    
    customersTableBody.addEventListener('click', (event) => {
        if (event.target.classList.contains('view-measurements')) {
            const customer = JSON.parse(event.target.dataset.customer);
            modalClientName.textContent = `${customer.client_name}'s Measurements`;
            modalMeasurementsJson.textContent = JSON.stringify(customer.secure_measurements, null, 2);
            modal.style.display = 'block';
        }
    });

    closeButton.addEventListener('click', () => {
        modal.style.display = 'none';
    });

    window.addEventListener('click', (event) => {
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    });

    addMeasurementFieldBtn.addEventListener('click', () => {
        const fieldNameRaw = newMeasurementNameInput.value.trim();
        if (fieldNameRaw) {
            const fieldName = fieldNameRaw.replace(/[^a-zA-Z0-9_]/g, '_').toLowerCase();
            const newField = document.createElement('div');
            newField.classList.add('form-group', 'measurement-field');
            newField.innerHTML = `
                <label>${fieldNameRaw}</label>
                <input type="number" step="0.1" name="${fieldName}">
            `;
            measurementsFields.appendChild(newField);
            newMeasurementNameInput.value = '';
        }
    });

    addCustomerForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const formData = new FormData(addCustomerForm);
        const clientName = formData.get('client_name');
        const phoneNumber = formData.get('phone_number');
        
        const measurements = {};
        document.querySelectorAll('.measurement-field input').forEach(input => {
            if(input.value) {
               measurements[input.name] = parseFloat(input.value);
            }
        });

        const newCustomer = {
            client_name: clientName,
            phone_number: phoneNumber,
            measurements: measurements
        };

        fetch(`${API_BASE_URL}measurements/customers?enterprise_id=${ACTIVE_ENTERPRISE_ID}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newCustomer)
        })
        .then(response => response.json())
        .then(data => {
            if (data.id) {
                fetchCustomers();
                addCustomerForm.reset();
                // Clear dynamically added measurement fields but keep defaults
                const allFields = measurementsFields.querySelectorAll('.measurement-field');
                allFields.forEach((field, index) => {
                    if(index > 1) field.remove();
                });
            } else {
                alert('Error adding customer: ' + (data.error || 'Unknown error'));
            }
        })
        .catch(error => console.error('Error adding customer:', error));
    });

    fetchCustomers();
});
</script>
{% endblock %}
